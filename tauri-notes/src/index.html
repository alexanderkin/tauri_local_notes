<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tauri Notes</title>
  </head>

  <body>
    <main class="container">
      <h1>我的本地笔记本</h1>
      <p class="tip">这是我们用 Tauri 做的第一个桌面笔记 App。</p>

      <div class="form-group">
        <label for="note-title">笔记标题</label>
        <input id="note-title" type="text" placeholder="例如：今天学了什么" />
      </div>

      <div class="form-group">
        <label for="note-content">笔记内容</label>
        <textarea
          id="note-content"
          placeholder="在这里输入你的笔记内容"
          rows="8"
        ></textarea>
      </div>

      <div class="button-group">
        <button id="save-btn">保存笔记</button>
        <button id="clear-btn" class="secondary-btn">清空全部笔记</button>
      </div>

      <p id="message">这里以后会显示保存结果。</p>
      <h2>已保存的笔记</h2>
      <div id="notes-list">这里以后会显示笔记内容。</div>
    </main>

    <script type="module" src="/main.js"></script>
  </body>
</html>
